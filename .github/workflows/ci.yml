name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: Lint • Typecheck • Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type-check
        run: yarn typecheck

      - name: Unit tests
        run: yarn test

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend
        run: python -m pip install -r backend/requirements.txt pytest

      - name: Pytest
        working-directory: backend
        run: PYTHONPATH=src python -m pytest -q

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: [lint-typecheck-test, backend]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          yarn install --frozen-lockfile
          python -m pip install -r backend/requirements.txt

      - name: Package PC Optimizer
        run: yarn package:pc-optimizer

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: pc-optimizer-installer
          path: apps/pc-optimizer/release/*.exe
